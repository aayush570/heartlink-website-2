              - { name: label, label: Visible label, type: string }
              - { name: type, label: Field type, type: string, description: "Use text, email, tel, url, select or textarea." }
              - { name: required, label: Required field, type: boolean }
              - { name: placeholder, label: Placeholder text, type: string }
              - { name: maxlength, label: Maximum length, type: number }
              - { name: options, label: Dropdown options, type: string, list: true }
          - { name: consent, label: Consent statement, type: text }
          - { name: button, label: Button text, type: string }

  - name: privacy
    label: "Privacy"
    type: file
    path: public/content/privacy.json
    format: json
    fields:
      - { name: seo, component: seo }
      - { name: hero, component: hero }
      - { name: cta, component: cta }
      - name: content
        label: Privacy content
        type: object
        fields:
          - { name: title, label: Section title, type: string }
          - { name: lead, label: Lead statement, type: text }
          - { name: paragraphs, label: Paragraphs, type: text, list: true }

settings:
  content:
    merge: true
  commit:
    templates:
      create: "content: create {filename}"
      update: "content: update {filename}"
      delete: "content: remove {filename}"
      rename: "content: rename {oldFilename} to {newFilename}"
