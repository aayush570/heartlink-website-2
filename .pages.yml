media:
  input: public/media
  output: /media
  rename: safe
  categories: [image]

components:
  seo:
    label: Search & social sharing
    type: object
    fields:
      - { name: title, label: Browser title, type: string, required: true }
      - { name: description, label: Search description, type: text, required: true }
      - { name: ogTitle, label: Social share title, type: string }
      - { name: ogDescription, label: Social share description, type: text }
      - { name: ogImage, label: Social share image, type: image }
  hero:
    label: Page introduction
    type: object
    fields:
      - { name: eyebrow, label: Small heading, type: string }
      - { name: title, label: Main headline, type: string, required: true, description: "Use <em>highlighted words</em>. Use <br> only where a line break is intentional." }
      - { name: description, label: Introductory paragraph, type: text }
  cta:
    label: Hero call to action
    type: object
    fields:
      - { name: primaryLabel, label: Main button label, type: string }
      - { name: primaryUrl, label: Main button link, type: string }
      - { name: showWhatsapp, label: Show WhatsApp button, type: boolean }
      - { name: whatsappLabel, label: WhatsApp button label, type: string }
  sectionIntro:
    label: Section heading
    type: object
    fields:
      - { name: eyebrow, label: Small heading, type: string }
      - { name: title, label: Section title, type: string, description: "Use <em>highlighted words</em>. Use <br> only where needed." }
      - { name: description, label: Supporting text, type: text }
  proofCard:
    label: Proof, story or media card
    type: object
    fields:
      - { name: label, label: Small label, type: string }
      - { name: title, label: Title, type: string, required: true }
      - { name: description, label: Description, type: text }
      - { name: image, label: Optional image, type: image }
      - { name: link, label: Optional proof link, type: string }
      - { name: source, label: Source or publication, type: string }
      - { name: date, label: Date or year, type: string }
  closing:
    label: Closing call to action
    type: object
    fields:
      - { name: eyebrow, label: Small heading, type: string }
      - { name: quote, label: Large statement, type: text }
      - { name: button, label: Button text, type: string }
      - { name: url, label: Button link, type: string }

content:
  - name: site
    label: "Site Settings"
    type: file
    path: public/content/site.json
    format: json
    fields:
      - { name: brandName, label: Brand name, type: string, required: true }
      - { name: brandDescriptor, label: Brand descriptor, type: string }
      - { name: logo, label: Logo, type: image, required: true }
      - name: headerCta
        label: Header buttons
        type: object
        fields:
          - { name: whatsappLabel, label: Desktop WhatsApp label, type: string }
          - { name: primaryLabel, label: Desktop apply label, type: string }
          - { name: primaryUrl, label: Apply link, type: string }
          - { name: mobileWhatsappLabel, label: Mobile WhatsApp label, type: string }
          - { name: mobilePrimaryLabel, label: Mobile apply label, type: string }
      - name: transactional
        label: Form submit messages
        type: object
        fields:
          - { name: sendingLabel, label: Sending label, type: string }
          - { name: successEyebrow, label: Success small heading, type: string }
          - { name: successTitle, label: Success title prefix, type: string }
          - { name: successSuffix, label: Success body suffix, type: text }
          - { name: returnLabel, label: Return link label, type: string }
          - { name: defaultError, label: Default error message, type: text }
      - { name: siteUrl, label: Canonical site URL, type: string, description: "Optional. Leave blank to use the deployed domain automatically." }
      - { name: defaultOgImage, label: Default social share image, type: image }
      - { name: themeColor, label: Browser theme colour, type: string, description: "Use the approved ivory default #F8F4EC unless the brand system changes." }
      - { name: primaryColor, label: Primary maroon colour, type: string }
      - { name: accentColor, label: Signature gold colour, type: string }
      - { name: secondaryAccentColor, label: Secondary green colour, type: string }
      - { name: conciergeEmail, label: Concierge email, type: string }
      - { name: whatsappNumber, label: WhatsApp number, type: string, description: "Use international format, for example +919326642337." }
      - { name: pressEmail, label: Press email, type: string }
      - { name: careersEmail, label: Careers email, type: string }
      - { name: privacyEmail, label: Privacy email, type: string }
      - { name: partnershipsEmail, label: Partnerships email, type: string }
      - { name: locations, label: Footer location line, type: string }
      - { name: footerStatement, label: Footer statement, type: text, description: "Use <br> where a line break is intentional." }
      - { name: footerLegal, label: Footer privacy/legal note, type: text }
      - name: footerColumns
        label: Footer link columns
        type: object
        list: { collapsible: { collapsed: true, summary: "{title}" } }
        fields:
          - { name: title, label: Column title, type: string }
          - name: links
            label: Links
            type: object
            list: { collapsible: { collapsed: true, summary: "{label}" } }
            fields:
              - { name: label, label: Link label, type: string }
              - { name: href, label: Link path, type: string, description: "Use {{whatsapp}} for the WhatsApp link." }
      - name: navigation
        label: Navigation links
        type: object
        list: { collapsible: { collapsed: true, summary: "{label}" } }
        fields:
          - { name: label, label: Link label, type: string }
          - { name: href, label: Link path, type: string }

  - name: home
    label: "Home"
    type: file
    path: public/content/home.json
    format: json
    fields:
      - { name: seo, component: seo }
      - name: hero
        label: Hero
        type: object
        fields:
          - { name: eyebrow, label: Small heading, type: string }
          - { name: title, label: Main headline, type: string, description: "Use <em>highlighted words</em>." }
          - { name: description, label: Introductory paragraph, type: text }
          - { name: primaryButton, label: Main button label, type: string }
          - { name: primaryUrl, label: Main button link, type: string }
          - { name: secondaryButton, label: Secondary link label, type: string }
          - { name: secondaryUrl, label: Secondary link, type: string }
          - { name: whatsappButton, label: WhatsApp button label, type: string }
          - { name: assurances, label: Assurance bullets under hero, type: string, list: true }
          - { name: note, label: Internal note line, type: string }
          - { name: privacyNote, label: Privacy note, type: text }
          - { name: profileImages, label: Private profile carousel images, type: image, list: true }
      - name: principles
        label: Four principle strip
        type: object
        list: { collapsible: { collapsed: true, summary: "{number} · {label}" } }
        fields:
          - { name: number, label: Number, type: string }
          - { name: label, label: Label, type: string }
      - name: proof
        label: Top proof numbers
        type: object
        list: { collapsible: { collapsed: true, summary: "{value} · {label}" } }
        fields:
          - { name: value, label: Value, type: string }
          - { name: label, label: Caption, type: string }
      - name: legacy
        label: Family trust section
        type: object
        fields:
          - { name: eyebrow, label: Small heading, type: string }
          - { name: title, label: Title, type: string }
          - { name: lead, label: Lead statement, type: text }
          - { name: paragraphs, label: Paragraphs, type: text, list: true }
          - { name: linkText, label: Link label, type: string }
          - { name: linkUrl, label: Link URL, type: string }
      - name: audience
        label: Parents and candidates section
        type: object
        fields:
          - { name: eyebrow, label: Small heading, type: string }
          - { name: title, label: Title, type: string }
          - { name: description, label: Description, type: text }
          - name: cards
            label: Audience cards
            type: object
            list: { collapsible: { collapsed: true, summary: "{label}" } }
            fields:
              - { name: label, label: Card label, type: string }
              - { name: icon, label: Icon text, type: string }
              - { name: title, label: Title, type: string }
              - { name: description, label: Description, type: text }
              - { name: points, label: Bullet points, type: string, list: true }
      - name: registry
        label: Registry section
        type: object
        fields:
          - { name: eyebrow, label: Small heading, type: string }
          - { name: title, label: Title, type: string }
          - { name: lead, label: Lead statement, type: text }
          - { name: paragraphs, label: Paragraphs, type: text, list: true }
          - { name: primaryLabel, label: Main button label, type: string }
          - { name: primaryUrl, label: Main button link, type: string }
          - { name: secondaryLabel, label: Secondary link label, type: string }
          - { name: secondaryUrl, label: Secondary link, type: string }
      - name: privacy
        label: Privacy cards section
        type: object
        fields:
          - { name: eyebrow, label: Small heading, type: string }
          - { name: title, label: Title, type: string }
          - { name: description, label: Description, type: text }
          - name: cards
            label: Privacy cards
            type: object
            list: { collapsible: { collapsed: true, summary: "{number} · {title}" } }
            fields:
              - { name: number, label: Number, type: string }
              - { name: title, label: Title, type: string }
              - { name: description, label: Description, type: text }
          - { name: seal, label: Seal text, type: text }
      - { name: proofHeading, component: sectionIntro }
      - { name: proofAssets, label: Proof photos and assets, component: proofCard, list: true }
      - name: process
        label: Homepage process section
        type: object
        fields:
          - { name: eyebrow, label: Small heading, type: string }
          - { name: title, label: Title, type: string }
          - { name: description, label: Description, type: text }
          - name: steps
            label: Steps
            type: object
            list: { collapsible: { collapsed: true, summary: "{number} · {title}" } }
            fields:
              - { name: number, label: Number, type: string }
              - { name: label, label: Small label, type: string }
              - { name: title, label: Title, type: string }
              - { name: description, label: Description, type: text }
      - { name: storiesHeading, component: sectionIntro }
      - name: stories
        label: Anonymized stories and testimonials
        type: object
        list: { collapsible: { collapsed: true, summary: "{label}" } }
        fields:
          - { name: label, label: Story label, type: string }
          - { name: quote, label: Quote or story, type: text }
          - { name: source, label: Source line, type: string }
      - name: founder
        label: Founder quote section
        type: object
        fields:
          - { name: image, label: Founder image, type: image }
          - { name: imageAlt, label: Image description, type: string }
          - { name: badge, label: Image badge, type: string }
          - { name: eyebrow, label: Small heading, type: string }
          - { name: quote, label: Quote, type: text }
          - { name: description, label: Description, type: text }
          - { name: signature, label: Signature text, type: string }
          - { name: linkText, label: Link label, type: string }
          - { name: linkUrl, label: Link URL, type: string }
      - name: finalCta
        label: Final invitation CTA
        type: object
        fields:
          - { name: eyebrow, label: Small heading, type: string }
          - { name: title, label: Title, type: string }
          - { name: description, label: Description, type: text }
          - { name: primaryLabel, label: Main button label, type: string }
          - { name: primaryUrl, label: Main button link, type: string }
          - { name: showWhatsapp, label: Show WhatsApp button, type: boolean }
          - { name: whatsappLabel, label: WhatsApp button label, type: string }
          - { name: note, label: Small note, type: string }

  - name: about
    label: "About"
    type: file
    path: public/content/about.json
    format: json
    fields:
      - { name: seo, component: seo }
      - { name: hero, component: hero }
      - { name: cta, component: cta }
      - name: curators
        label: Founder and advisor profiles
        type: object
        list: { collapsible: { collapsed: true, summary: "{name}" } }
        fields:
          - { name: name, label: Name, type: string, required: true }
          - { name: role, label: Role, type: string }
          - { name: eyebrow, label: Small heading, type: string }
          - { name: title, label: Large title, type: string }
          - { name: lead, label: Lead paragraph, type: text }
          - { name: image, label: Portrait, type: image }
          - { name: imageAlt, label: Image description, type: string }
          - { name: theme, label: Fallback portrait style, type: string, description: "Used only if no portrait is uploaded. Recommended values: classic or deep." }
          - { name: paragraphs, label: Biography paragraphs, type: text, list: true }
          - name: credentials
            label: Credentials
            type: object
            list: { collapsible: { collapsed: true, summary: "{title}" } }
            fields:
              - { name: title, label: Short title, type: string }
              - { name: description, label: Description, type: text }
      - { name: proofHeading, component: sectionIntro }
      - { name: proofAssets, label: Founder proof and media assets, component: proofCard, list: true }
      - { name: closing, component: closing }

  - name: membership
    label: "Services"
    type: file
    path: public/content/membership.json
    format: json
    fields:
      - { name: seo, component: seo }
      - { name: hero, component: hero }
      - { name: cta, component: cta }
      - name: tiers
        label: Service options
        type: object
        list: { collapsible: { collapsed: true, summary: "{title}" } }
        fields:
          - { name: label, label: Option label, type: string }
          - { name: title, label: Option name, type: string }
          - { name: description, label: Description, type: text }
          - { name: features, label: Included features, type: string, list: true }
          - { name: button, label: Button text, type: string }
          - { name: tone, label: Visual treatment, type: string, description: "Use registry, success, premium or black." }
          - { name: black, label: Use dark premium styling, type: boolean }
      - name: protocol
        label: Admissions explanation
        type: object
        fields:
          - { name: title, label: Title, type: string }
          - { name: paragraphs, label: Paragraphs, type: text, list: true }
      - name: process
        label: Service process heading
        type: object
        fields:
          - { name: eyebrow, label: Small heading, type: string }
          - { name: title, label: Title, type: string }
          - { name: description, label: Description, type: text }
      - name: steps
        label: Service process steps
        type: object
        list: { collapsible: { collapsed: true, summary: "{number} · {title}" } }
        fields:
          - { name: label, label: Small label, type: string }
          - { name: number, label: Step number, type: string }
          - { name: title, label: Step title, type: string }
          - { name: description, label: Description, type: text }
      - name: afterSubmit
        label: After-submit explanation
        type: object
        fields:
          - { name: eyebrow, label: Small heading, type: string }
          - { name: title, label: Title, type: string }
          - { name: description, label: Description, type: text }
          - { name: cards, label: Cards, component: proofCard, list: true }
      - { name: closing, component: closing }

  - name: careers
    label: "Careers"
    type: file
    path: public/content/careers.json
    format: json
    fields:
      - { name: seo, component: seo }
      - { name: hero, component: hero }
      - { name: cta, component: cta }
      - { name: rolesIntro, component: sectionIntro }
      - name: roles
        label: Open roles
        type: object
        list: { collapsible: { collapsed: true, summary: "{title}" } }
        fields:
          - { name: title, label: Job title, type: string }
          - { name: details, label: Location and requirements, type: text }
      - name: culture
        label: Culture
        type: object
        fields:
          - { name: eyebrow, label: Small heading, type: string }
          - { name: title, label: Title, type: string }
          - { name: description, label: Description, type: text }
          - { name: cards, label: Values, component: proofCard, list: true }
      - { name: closing, component: closing }

  - name: apply
    label: "Application"
    type: file
    path: public/content/apply.json
    format: json
    fields:
      - { name: seo, component: seo }
      - name: intro
        label: Application introduction
        type: object
        fields:
          - { name: eyebrow, label: Small heading, type: string }
          - { name: title, label: Main headline, type: string }
          - { name: description, label: Description, type: text }
          - { name: assuranceTitle, label: Confidentiality badge title, type: string }
          - { name: assuranceDescription, label: Confidentiality badge description, type: text }
          - { name: returnLinkLabel, label: Return link label, type: string }
          - name: protocol
            label: Small progress strip
            type: object
            list: true
            fields:
              - { name: number, label: Number, type: string }
              - { name: label, label: Step, type: string }
      - name: form
        label: Form guidance
        type: object
        fields:
          - { name: eyebrow, label: Form section label, type: string }
          - { name: introduction, label: Form introduction, type: text }
          - name: stepHeader
            label: Top summary line
            type: object
            fields:
              - { name: durationLabel, label: Left text, type: string, description: "Example: Approximately 5 minutes" }
              - { name: reviewLabel, label: Right text, type: string, description: "Example: Reviewed privately" }
          - name: steps
            label: Four application steps
            type: object
            list: { collapsible: { collapsed: true, summary: "{number} · {title}" } }
            fields:
              - { name: number, label: Step number, type: string }
              - { name: small, label: Small step label, type: string }
              - { name: title, label: Step title, type: string }
              - { name: intro, label: Step intro text, type: text }
              - { name: relationshipLabel, label: Relationship field label, type: string }
              - { name: relationshipOptions, label: Relationship options, type: string, list: true }
              - name: choices
                label: Choice cards
                type: object
                list: { collapsible: { collapsed: true, summary: "{label}" } }
                fields:
                  - { name: label, label: Choice title, type: string }
                  - { name: description, label: Choice description, type: text }
                  - { name: value, label: Submitted value, type: string }
              - name: fields
                label: Field labels used by this step
                type: object
                fields:
                  - { name: contactName, label: Contact full name, type: string }
                  - { name: email, label: Email, type: string }
                  - { name: phone, label: Phone, type: string }
                  - { name: applicantName, label: Candidate full name, type: string }
                  - { name: age, label: Age, type: string }
                  - { name: address, label: Locality/city/country, type: string }
                  - { name: designation, label: Profession/designation, type: string }
                  - { name: company, label: Company/organisation, type: string }
                  - { name: school, label: School, type: string }
                  - { name: undergraduate, label: Undergraduate, type: string }
                  - { name: postgraduate, label: Postgraduate, type: string }
                  - { name: linkedinProfile, label: LinkedIn, type: string }
                  - { name: instagramProfile, label: Instagram, type: string }
                  - { name: introduction, label: Candidate introduction, type: string }
                  - { name: fatherName, label: Father/guardian name, type: string }
                  - { name: fatherProfession, label: Father/guardian profession, type: string }
                  - { name: fatherCompany, label: Father/guardian company, type: string }
                  - { name: motherName, label: Mother/guardian name, type: string }
                  - { name: motherProfession, label: Mother/guardian profession, type: string }
                  - { name: motherCompany, label: Mother/guardian company, type: string }
                  - { name: familyResidence, label: Family residence, type: string }
                  - { name: familyValues, label: Family priorities, type: string }
              - name: placeholders
                label: Placeholder/helper text used by this step
                type: object
                fields:
                  - { name: address, label: Locality placeholder, type: string }
                  - { name: linkedinProfile, label: LinkedIn placeholder, type: string }
                  - { name: instagramProfile, label: Instagram placeholder, type: string }
                  - { name: introduction, label: Candidate intro placeholder, type: text }
                  - { name: familyResidence, label: Family residence placeholder, type: string }
                  - { name: familyValues, label: Family priorities placeholder, type: text }
          - name: nextSteps
            label: What happens after submitting
            type: object
            fields:
              - { name: title, label: Box title, type: string }
              - { name: items, label: Steps list, type: string, list: true }
          - { name: verificationTitle, label: Verification box title, type: string }
          - { name: verificationNote, label: Verification box description, type: text }
          - { name: disclaimer, label: Acceptance disclaimer, type: text }
          - { name: consent, label: Consent statement, type: text }
          - { name: button, label: Submit button label, type: string }
      - name: faqs
        label: Frequently asked questions shown below the form
        type: object
        list: { collapsible: { collapsed: true, summary: "{question}" } }
        fields:
          - { name: question, label: Question, type: string }
          - { name: answer, label: Answer, type: text }

